<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>培训班排房系统</title>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;--slate-400:#94a3b8;--slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b;
  --blue:#2563eb;--blue-dark:#1d4ed8;--blue-light:#eff6ff;
  --green:#16a34a;--green-light:#f0fdf4;--green-dark:#15803d;
  --red:#dc2626;--red-light:#fef2f2;
  --gold:#b8860b;--gold-light:#fef3c7;--gold-dark:#92600a;
  --amber:#f59e0b;--amber-light:#fffbeb;
  --indigo:#6366f1;--indigo-light:#eef2ff;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--shadow-md:0 4px 6px rgba(0,0,0,0.07),0 2px 4px rgba(0,0,0,0.06);--shadow-lg:0 10px 25px rgba(0,0,0,0.1),0 4px 10px rgba(0,0,0,0.06);--transition:200ms cubic-bezier(0.4,0,0.2,1);
}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--slate-50);color:var(--slate-700);line-height:1.5}
button{cursor:pointer;font:inherit;color:inherit;border:none;background:none}
input,select,textarea{font:inherit}
.header{background:linear-gradient(135deg,var(--navy) 0%,#1a2a4a 100%);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.header-logo svg{width:20px;height:20px}
.header-tabs{display:flex;gap:4px;margin-left:24px}
.header-tab{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--slate-300);transition:all var(--transition)}
.header-tab:hover{background:rgba(255,255,255,0.1);color:#fff}
.header-tab.act{background:rgba(255,255,255,0.18);color:#fff;box-shadow:0 0 12px rgba(255,255,255,0.08)}
.toolbar{background:#fff;border-bottom:1px solid var(--slate-200);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:var(--shadow)}
.toolbar-group{display:flex;align-items:center;gap:6px}
.toolbar-label{font-size:12px;font-weight:600;color:var(--slate-500);white-space:nowrap}
.toolbar-select{padding:6px 12px;border:1px solid var(--slate-300);border-radius:var(--radius-sm);font-size:13px;color:var(--slate-700);background:#fff;outline:none;cursor:pointer;transition:border var(--transition)}.toolbar-select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,0.15)}
.toolbar-date{padding:6px 12px;border:1px solid var(--slate-300);border-radius:var(--radius-sm);font-size:13px;color:var(--slate-700);background:#fff;outline:none;transition:border var(--transition)}.toolbar-date:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,0.15)}
.toolbar-divider{width:1px;height:24px;background:var(--slate-200)}
.stats-bar{display:flex;background:#fff;border-bottom:1px solid var(--slate-200);padding:0 24px;overflow-x:auto;box-shadow:var(--shadow)}
.stat-item{display:flex;align-items:center;gap:10px;padding:12px 20px;border-right:1px solid var(--slate-100)}
.stat-item:last-child{border-right:none}
.stat-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.stat-icon svg{width:16px;height:16px}
.stat-value{font-size:18px;font-weight:800;color:var(--slate-800)}
.stat-label{font-size:11px;color:var(--slate-500);font-weight:500}
.stat-icon.b11{background:var(--blue-light);color:var(--blue)}
.stat-icon.b12{background:var(--indigo-light);color:var(--indigo)}
.stat-icon.avl{background:var(--green-light);color:var(--green-dark)}
.stat-icon.bkd{background:var(--red-light);color:var(--red)}
.stat-icon.wh{background:var(--amber-light);color:var(--amber)}
.main{padding:20px 24px 40px;max-width:1400px;margin:0 auto}
.page{display:none}
.page.act{display:block}
.floor-section{margin-bottom:28px}
.floor-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.floor-header h3{font-size:15px;font-weight:700;color:var(--slate-800)}
.floor-header .fb{background:var(--navy);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;box-shadow:var(--shadow)}
.floor-header .fc{font-size:11px;color:var(--slate-400);margin-left:auto}
.floor-header .fc span{font-weight:600;color:var(--slate-600)}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:7px}
.room-card{background:#fff;border-radius:8px;border:1px solid var(--slate-200);padding:10px 8px;cursor:pointer;text-align:center;user-select:none;position:relative;transition:all 250ms cubic-bezier(0.4,0,0.2,1);overflow:hidden}
.room-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px);border-color:var(--slate-300)}
.room-card .rn{font-size:15px;font-weight:800;color:var(--slate-800);letter-spacing:0.3px}
.room-card .rt{font-size:10px;color:var(--slate-400)}
.room-card .rd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-top:3px}
.room-card .rnm{font-size:9px;color:var(--slate-500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-card.avl{border-left:3px solid var(--green)}
.room-card.avl .rd{background:var(--green)}
.room-card.bkd{border-left:3px solid var(--red);background:var(--red-light);cursor:default;opacity:0.85}
.room-card.bkd .rd{background:var(--red)}
.room-card.bkd .rnm{color:var(--red);font-weight:500}
.room-card.sel{border-left:3px solid var(--blue);background:var(--blue-light);box-shadow:0 0 0 1px var(--blue),0 2px 8px rgba(37,99,235,0.15)}
.room-card.sel .rd{background:var(--blue)}
.room-card.sel .rnm{color:var(--blue)}
.room-card .rst{font-size:9px;margin-top:1px}.room-card .rbb{font-size:9px;color:var(--red);margin-top:3px}
.floor-tabs{display:flex;gap:4px;flex-wrap:wrap}
.floor-tab{padding:4px 12px;border-radius:14px;font-size:12px;font-weight:500;color:var(--slate-600);background:var(--slate-100)}
.floor-tab:hover{background:var(--slate-200)}
.floor-tab.act{background:var(--navy);color:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;white-space:nowrap;transition:all var(--transition)}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 4px rgba(37,99,235,0.3)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--slate-100);color:var(--slate-700)}
.btn-success{background:var(--green);color:#fff;box-shadow:0 2px 4px rgba(22,163,74,0.3)}
.btn-success:hover{background:var(--green-dark)}
.btn-danger{background:var(--red);color:#fff;box-shadow:0 2px 4px rgba(220,38,38,0.3)}
.btn-sm{padding:4px 10px;font-size:12px}
.bp{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.bp h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:2px solid var(--gold-light)}
.bp .fr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg{margin-bottom:0}
.fl{display:block;font-size:12px;font-weight:600;color:var(--slate-700);margin-bottom:5px}
.fl .rq{color:var(--red)}
.fi{width:100%;padding:8px 12px;border:1px solid var(--slate-300);border-radius:var(--radius-sm);font-size:13px;color:var(--slate-800);background:#fff;transition:border var(--transition)}.fi:hover{border-color:var(--slate-400)}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
.srl{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:36px;padding:10px;border:1.5px dashed var(--slate-300);border-radius:var(--radius-sm);background:var(--slate-50);transition:border var(--transition)}.srl:focus-within{border-color:var(--blue)}
.rtag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;background:var(--blue-light);color:var(--blue);border:1px solid rgba(37,99,235,0.15);transition:all var(--transition)}.rtag:hover{background:var(--blue);color:#fff}
.rtag .rdel{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;cursor:pointer}
.sc-list{display:flex;flex-direction:column;gap:12px}
.sc-card{background:#fff;border:1px solid var(--slate-200);border-radius:8px;padding:14px 18px}
.sc-card .sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-card .scd{font-size:14px;font-weight:600;color:var(--slate-800);display:flex;align-items:center;gap:6px}
.sc-card .sdd{font-size:12px;color:var(--slate-500)}
.sc-card .scr{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.sc-card .srt2{padding:2px 8px;background:var(--slate-100);border-radius:4px;font-size:12px;color:var(--slate-700);font-weight:500}
.sc-card .sci{font-size:12px;color:var(--slate-500);margin-top:6px;display:flex;gap:16px;flex-wrap:wrap}
.sc-card .sca{margin-top:8px;display:flex;gap:6px}
.scard{background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:16px 20px;margin-bottom:16px}
.scard h3{font-size:14px;font-weight:600;color:var(--slate-800);margin-bottom:10px}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:6px 8px;color:var(--slate-400);font-weight:500;border-bottom:1px solid var(--slate-200);font-size:12px}
.st td{padding:6px 8px;border-bottom:1px solid var(--slate-100);color:var(--slate-700)}
.st tr:hover td{background:var(--slate-50)}
.st .rl{font-size:12px;color:var(--slate-500)}
.emp{text-align:center;padding:50px 20px;color:var(--slate-400)}
.emp svg{width:44px;height:44px;margin-bottom:10px;opacity:0.4}
.emp p{font-size:14px}
.mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.mod.open{display:flex}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.2);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:su 200ms ease}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--slate-200)}
.mh h3{font-size:15px;font-weight:600;color:var(--slate-800);display:flex;align-items:center;gap:8px}
.mc{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--slate-400)}
.mc:hover{background:var(--slate-100);color:var(--slate-600)}
.mb{padding:16px 20px}
.mf{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--slate-200);background:var(--slate-50);border-radius:0 0 12px 12px}
.tc{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.tt{padding:10px 16px;border-radius:6px;background:var(--navy);color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;animation:su 200ms ease}
.ni{width:50px;border:none;border-bottom:1px dashed var(--slate-300);background:transparent;font-size:12px;padding:0 2px;outline:none}
.ni:focus{border-bottom-color:var(--blue)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:3px}

.bill-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.bill-table th,.bill-table td{border:1px solid #999;padding:4px 6px;text-align:center;font-size:12px}
.bill-table th{background:#e8e8e8;font-weight:600;color:#333}
.bill-table .ni2{width:50px;border:none;border-bottom:1px solid #aaa;background:transparent;font-size:12px;padding:0 2px;outline:none;text-align:center}
.bill-table .ni2:focus{border-bottom-color:var(--blue)}
.bill-table .rdel2{color:#c00;cursor:pointer;font-size:14px;font-weight:700}
.bill-table .room-num{font-weight:600}
.sel-hint{color:var(--slate-400);font-size:12px;padding:8px;text-align:center}

/* === 库房管理系统 === */
.wh-tabs{display:flex;gap:4px;margin-bottom:16px}
.wh-tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;color:var(--slate-600);background:var(--slate-100)}
.wh-tab:hover{background:var(--slate-200)}
.wh-tab.act{background:var(--navy);color:#fff}
/* KPI 卡片 */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px}
.kpi-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:22px;height:22px}
.kpi-val{font-size:26px;font-weight:700;color:var(--slate-800);line-height:1.1}
.kpi-label{font-size:11px;color:var(--slate-500)}
.kpi-sub{font-size:10px;color:var(--slate-400);margin-top:1px}
.kpi-icon.ki-blue{background:var(--blue-light);color:var(--blue)}
.kpi-icon.ki-green{background:var(--green-light);color:var(--green-dark)}
.kpi-icon.ki-amber{background:var(--amber-light);color:var(--amber)}
.kpi-icon.ki-red{background:var(--red-light);color:var(--red)}
.kpi-icon.ki-purple{background:#f3e8ff;color:#7c3aed}
/* 二级行 */
.row2{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:20px}
/* 物品卡片网格 */
.wh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.wh-card{background:#fff;border:1px solid var(--slate-200);border-radius:8px;padding:14px 16px;transition:box-shadow var(--transition)}
.wh-card:hover{box-shadow:var(--shadow-lg)}
.wh-card .wc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.wh-card .wc-code{font-size:10px;font-family:monospace;color:var(--slate-400);background:var(--slate-100);padding:1px 6px;border-radius:3px}
.wh-card .wc-cat{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.wh-card .wc-cat.bc{background:var(--blue-light);color:var(--blue)}
.wh-card .wc-cat.kf{background:var(--red-light);color:var(--red)}
.wh-card .wc-cat.cl{background:var(--green-light);color:var(--green-dark)}
.wh-card .wc-cat.wx{background:var(--amber-light);color:var(--amber)}
.wh-card .wc-cat.bg{background:var(--indigo-light);color:var(--indigo)}
.wh-card .wc-cat.gd{background:#f3e8ff;color:#7c3aed}
.wh-card .wc-cat.qt{background:var(--slate-200);color:var(--slate-600)}
.wh-card .wc-name{font-size:14px;font-weight:600;color:var(--slate-800);margin-bottom:8px}
.wh-card .wc-main{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.wh-card .wc-qty{font-size:22px;font-weight:700}
.wh-card .wc-unit{font-size:11px;color:var(--slate-500)}
.wh-card .wc-bar-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.wh-card .wc-bar{width:80px;height:6px;background:var(--slate-200);border-radius:3px;overflow:hidden}
.wh-card .wc-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width 300ms}
.wh-card .wc-bar-fill.low{background:var(--red)}
.wh-card .wc-bar-fill.warn{background:var(--amber)}
.wh-card .wc-lvl{font-size:11px;font-weight:600}.wc-lvl.ok{color:var(--green)}.wc-lvl.warn{color:var(--amber)}.wc-lvl.low{color:var(--red)}
.wh-card .wc-info{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--slate-500);margin-bottom:8px}
.wh-card .wc-acts{display:flex;gap:5px;padding-top:8px;border-top:1px solid var(--slate-100)}
.wh-card .wc-btn{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--slate-200);background:#fff;color:var(--slate-600)}
.wh-card .wc-btn:hover{background:var(--slate-100)}
/* 出入库记录标签 */
.tag-in{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-out{background:var(--red-light);color:var(--red);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-check{background:#f3e8ff;color:#7c3aed;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
/* 导入验收单 */
.imp-zone{border:2px dashed var(--slate-300);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all var(--transition);background:var(--slate-50)}
.imp-zone:hover{border-color:var(--blue);background:var(--blue-light)}
.imp-zone.drag{border-color:var(--blue);background:var(--blue-light)}
.imp-zone svg{width:36px;height:36px;color:var(--slate-400);margin-bottom:8px}
.imp-zone .iz-title{font-size:14px;font-weight:600;color:var(--slate-600)}
.imp-zone .iz-sub{font-size:12px;color:var(--slate-400);margin-top:4px}
.imp-preview{max-height:400px;overflow-y:auto;margin-top:16px}
.imp-preview table{font-size:11px}
.imp-preview th{position:sticky;top:0;background:var(--slate-100);z-index:1;font-size:11px}
.imp-preview td{padding:4px 6px}
.imp-meta{display:flex;gap:16px;flex-wrap:wrap;padding:12px;background:var(--slate-50);border-radius:6px;margin-bottom:12px;font-size:12px}
.imp-meta .im-row{display:flex;align-items:center;gap:4px}
.imp-meta .im-label{color:var(--slate-400)}.imp-meta .im-val{font-weight:600;color:var(--slate-700)}
.imp-summary{font-size:12px;color:var(--slate-500);margin:10px 0}
/* 盘点结果 */
.check-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--slate-100)}
.check-row .cr-name{flex:1;font-size:13px}
.check-row .cr-qty{font-size:13px;font-weight:600;text-align:right;min-width:50px}
/* 预警列表 */
.alert-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--red-light);border-radius:6px;margin-bottom:6px;font-size:12px}
.alert-item .al-name{font-weight:600;color:var(--red)}
.alert-item .al-qty{color:var(--slate-600)}
.alert-item .al-act{margin-left:auto}

@media(max-width:768px){
  .header{padding:0 16px}.header-logo span{display:none}.header-tabs{gap:2px;margin-left:12px}.header-tab{padding:4px 10px;font-size:12px}
  .toolbar{padding:10px 16px}.stats-bar{overflow-x:auto;padding:0 16px}.stat-item{padding:8px 12px}.stat-value{font-size:15px}
  .main{padding:16px}.room-grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px}
  .bp .fr{grid-template-columns:1fr}.modal{max-width:100%;margin:10px}
  .kpi-row{grid-template-columns:1fr 1fr}.row2{grid-template-columns:1fr}.wh-grid{grid-template-columns:1fr}
}

.date-overview{border:1px solid var(--slate-200);border-radius:var(--radius);margin:16px 24px 20px;background:#fff;overflow:hidden;box-shadow:var(--shadow);}
.date-ov-header{display:flex;align-items:center;gap:8px;padding:12px 18px;cursor:pointer;font-size:14px;font-weight:700;color:var(--navy);background:linear-gradient(to right,var(--slate-50),#fff);border-bottom:1px solid var(--slate-200);transition:background var(--transition);}
.date-ov-header:hover{background:var(--slate-100);}
.date-ov-header i.rotated{transform:rotate(-90deg);}
.date-ov-body{padding:14px 18px;}

// ==================== 库房管理系统 ====================
function whTab(t){whTabSt=t;document.querySelectorAll('.wh-tab').forEach(function(x){x.classList.remove('act');});var ts=document.querySelectorAll('.wh-tab'),idx=t==='dash'?0:t==='list'?1:t==='log'?2:3;ts[idx].classList.add('act');rWh();}

function rWh(){
  updateWhStats();
  var c=document.getElementById('whc');
  if(whTabSt==='log'){renderLog(c);return;}
  if(whTabSt==='check'){renderCheck(c);return;}
  if(whTabSt==='dash'){renderDash(c);return;}

  // === 库存管理 ===
  var cat1=(document.getElementById('whCat1')?document.getElementById('whCat1').value:'all');
  var cat2=(document.getElementById('whCat2')?document.getElementById('whCat2').value:'all');
  var loc=(document.getElementById('whLoc')?document.getElementById('whLoc').value:'all');
  var kw=(document.getElementById('whSearch')?(document.getElementById('whSearch').value||'').trim().toLowerCase():'');
  var items=WH;
  if(cat1!=='all')items=items.filter(function(w){return w.cat1===cat1;});
  if(cat2!=='all')items=items.filter(function(w){return w.cat2===cat2;});
  if(loc!=='all')items=items.filter(function(w){return w.loc===loc;});
  if(kw)items=items.filter(function(w){return (w.code||'').toLowerCase().indexOf(kw)!==-1||w.name.toLowerCase().indexOf(kw)!==-1;});
  if(items.length===0){c.innerHTML='<div class="emp"><i data-lucide="package"></i><p>暂无匹配库存</p></div>';return;}
  var grp={};for(var i=0;i<items.length;i++){var w=items[i];if(!grp[w.cat1])grp[w.cat1]=[];grp[w.cat1].push(w);}
  var catOrder=Object.keys(WH_CATS),h='';
  for(var ci=0;ci<catOrder.length;ci++){var cn=catOrder[ci];if(!grp[cn])continue;var ws=grp[cn],tq=0,lw=0;
    for(var wi=0;wi<ws.length;wi++){tq+=ws[wi].qty;if((ws[wi].minStock||0)>0&&ws[wi].qty<=ws[wi].minStock)lw++;}
    h+='<div class="scard"><h3><i data-lucide="package" style="width:16px;height:16px;vertical-align:middle;"></i> '+cn+' <span style="font-weight:400;color:var(--slate-400);font-size:12px;">'+ws.length+'种 &middot; '+tq+(ws[0].unit||'件')+(lw>0?' &middot; <span style="color:var(--red)">'+lw+'预警</span>':'')+'</span></h3><div class="wh-grid">';
    for(var wi=0;wi<ws.length;wi++){var w=ws[wi],ms=w.minStock||5,mx=w.maxStock||Math.max(w.qty*2,20),ratio=Math.min(100,Math.round(w.qty/mx*100)),barCls='',lvlCls='ok',lvlTxt='正常';
      if(w.qty<=ms){barCls=' low';lvlCls='low';lvlTxt='缺货';}else if(w.qty<=ms*2){barCls=' warn';lvlCls='warn';lvlTxt='偏低';}
      h+='<div class="wh-card"><div class="wc-top"><span class="wc-code">'+(w.code||'')+'</span><span class="wc-cat '+(WH_CATS[w.cat1]?WH_CATS[w.cat1].color:'qt')+'">'+w.cat1+'/'+w.cat2+'</span></div>';
      h+='<div class="wc-name">'+w.name+'</div><div class="wc-main"><span class="wc-qty" style="'+(w.qty<=ms?'color:var(--red)':'')+'">'+w.qty+'</span><span class="wc-unit">'+w.unit+'</span><div class="wc-bar-wrap"><div class="wc-bar"><div class="wc-bar-fill'+barCls+'" style="width:'+ratio+'%"></div></div><span class="wc-lvl '+lvlCls+'">'+lvlTxt+'</span></div></div>';
      h+='<div class="wc-info"><span><i data-lucide="map-pin" style="width:10px;height:10px;"></i> '+(WH_LOCS[w.loc]||w.loc)+'</span>'+(w.shelf?'<span>货架 '+w.shelf+'</span>':'')+'<span>安全库存 '+ms+'</span></div>';

// === 总控看板 ===
function renderDash(c){
  var totalQty=0,lowCnt=0;for(var i=0;i<WH.length;i++){totalQty+=WH[i].qty;if((WH[i].minStock||0)>0&&WH[i].qty<=WH[i].minStock)lowCnt++;}
  var sku=WH.length,locSet={};for(var i=0;i<WH.length;i++)locSet[WH[i].loc]=1;var locCnt=0;for(var k in locSet)locCnt++;
  // 月周转率
  var monthAgo=new Date();monthAgo.setMonth(monthAgo.getMonth()-1);var monthOps=0;
  for(var i=0;i<WHL.length;i++){if(WHL[i].dt>=monthAgo.toISOString().slice(0,10))monthOps++;}
  var turnover=sku>0?(monthOps/sku).toFixed(1):'0.0';

  // 部门消耗（最近30天）
  var deptUse={};
  for(var i=0;i<WHL.length;i++){var l=WHL[i];if(l.dt>=monthAgo.toISOString().slice(0,10)&&(l.type==='out'||l.type==='loss')){var d=l.op.split('-')[0]||'未指定';deptUse[d]=(deptUse[d]||0)+l.qty;}}

  var h='';
  // 预警列表
  var alerts=WH.filter(function(w){return (w.minStock||0)>0&&w.qty<=w.minStock;}).sort(function(a,b){return a.qty-a.minStock-(b.qty-b.minStock);});
  h+='<div class="row2"><div class="scard"><h3><i data-lucide="alert-triangle" style="width:16px;height:16px;vertical-align:middle;"></i> 低库存预警</h3>';
  if(alerts.length===0)h+='<div style="font-size:13px;color:var(--slate-400);padding:10px">所有物品库存正常</div>';
  else for(var i=0;i<Math.min(alerts.length,8);i++){var a=alerts[i];
    h+='<div class="alert-item"><span class="al-name">'+a.name+'</span><span class="al-qty">库存 '+a.qty+a.unit+' / 安全库存 '+(a.minStock||5)+a.unit+'</span><button class="btn btn-sm btn-primary al-act" onclick="whAct(\'in\',\''+a.id+'\')">补货</button></div>';}
  h+='</div>';
  // 部门消耗
  h+='<div class="scard"><h3><i data-lucide="users" style="width:16px;height:16px;vertical-align:middle;"></i> 部门消耗（30天）</h3>';
  var dk=Object.keys(deptUse).sort(function(a,b){return deptUse[b]-deptUse[a];});
  if(dk.length===0)h+='<div style="font-size:13px;color:var(--slate-400);padding:10px">暂无消耗数据</div>';
  else{h+='<table class="st"><tr><th>部门</th><th style="text-align:right;">消耗量</th></tr>';
  for(var i=0;i<Math.min(dk.length,6);i++){h+='<tr><td>'+dk[i]+'</td><td style="text-align:right;font-weight:600;">'+deptUse[dk[i]]+'</td></tr>';}}
  h+='</table></div></div>';
  c.innerHTML=h;lucide.createIcons();
}

function impHandle(file){
  if(!file||!file.name.endsWith('.docx')){t('请选择 .docx 文件','e');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    if(typeof mammoth==='undefined'){t('mammoth.js 未加载，请刷新后重试','e');return;}
    mammoth.extractRawText({arrayBuffer:e.target.result}).then(function(r){impParse(r.value);}).catch(function(){impParseFallback();});
  };
  reader.readAsArrayBuffer(file);
}

function impParseFallback(){
  t('请确保上传的是 Word .docx 格式验收单','e');
}

function impParse(raw){
  var lines=raw.split(/\n/).map(function(l){return l.trim();}).filter(function(l){return l;});
  var info={project:'',supplier:'',amount:'',date:''};
  for(var i=0;i<Math.min(lines.length,20);i++){
    var ln=lines[i];
    if(/采购品目/.test(ln))info.project=ln.replace(/.*采购品目名称\s*/,'').trim();
    if(/供应商/.test(ln))info.supplier=ln.replace(/.*供应商名称\s*/,'').trim();
    if(/合同总金额/.test(ln)){var am=ln.match(/([\d.]+)/);if(am)info.amount=am[1];}
    if(/验收日期/.test(ln)){var dm=ln.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);if(dm)info.date=dm[1]+'-'+dm[2].padStart(2,'0')+'-'+dm[3].padStart(2,'0');}
  }
  // 找验收记录表
  var tblStart=-1;
  for(var i=0;i<lines.length;i++){if(/验收记录.*序号|设备名称.*型号.*合同数量/.test(lines[i])){tblStart=i;break;}}
  if(tblStart===-1){t('未找到验收记录表格，请确认文件格式','e');return;}

  var items=[];
  for(var i=tblStart+1;i<lines.length;i++){
    var ln=lines[i];
    if(/合同一致性|产品性能测试|验收结论|供应商代表|验收小组|备注/.test(ln))break;
    var parts=ln.split(/\s{2,}/);
    if(parts.length>=4&&/^\d+$/.test(parts[0])){
      // 找到所有数字列
      var nums=[];for(var j=0;j<parts.length;j++)if(/^\d+$/.test(parts[j]))nums.push(parseInt(parts[j]));
      if(nums.length>=3){
        var name=parts[1]||'';
        var model='';
        for(var j=2;j<parts.length;j++){if(!/^\d+$/.test(parts[j])){model=parts[j];break;}}
        var cq=nums[nums.length-2],aq=nums[nums.length-1];
        items.push({seq:nums[0],name:name,model:model,contractQty:cq,acceptQty:aq});
      }
    }
  }

  if(items.length===0){t('未解析到设备条目','e');return;}
  impData={info:info,items:items};
  impPreview();
}

  h+='<div class="im-row"><span class="im-label">供应商</span><span class="im-val">'+(info.supplier||'未知')+'</span></div>';
  h+='<div class="im-row"><span class="im-label">金额</span><span class="im-val">¥'+(info.amount||'-')+'</span></div>';

  h+='<div style="margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap"><div class="fg" style="min-width:120px"><label class="fl">入库分类</label><select class="fi" id="impCat">';

  for(var i=0;i<items.length;i++){var it=items[i];h+='<tr><td>'+it.seq+'</td><td style="text-align:left;font-weight:500">'+it.name+'</td><td style="font-size:11px;color:var(--slate-500)">'+it.model+'</td><td>'+it.contractQty+'</td><td style="font-weight:600">'+it.acceptQty+'</td></tr>';}
  h+='</table></div>';
  document.getElementById('mb_imp').innerHTML=h;
  document.getElementById('mf_imp').innerHTML='<button class="btn btn-secondary" onclick="cmImp()">取消</button><button class="btn btn-success" onclick="impDo()">确认入库 '+items.length+' 项</button>';
  lucide.createIcons();
}

function impDo(){
  if(!impData)return;
  var cat=document.getElementById('impCat').value,loc=document.getElementById('impLoc').value,date=document.getElementById('impDate').value;
  var items=impData.items,info=impData.info,added=0;
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var code=cat.substring(0,2).toUpperCase()+'-'+date.replace(/-/g,'').slice(2)+'-'+(i+1).toString().padStart(3,'0');
    var sub=WH_CATS[cat]?WH_CATS[cat].sub[0]:cat;
    WH.push({id:'w'+Date.now()+Math.random().toString(36).slice(2,4),code:code,name:it.name,cat1:cat,cat2:sub,unit:'台',qty:it.acceptQty||it.contractQty,minStock:Math.max(1,Math.round(it.contractQty*0.1)),maxStock:Math.max(it.contractQty*2,10),loc:loc,shelf:'导入-'+date,supplier:info.supplier||''});
    WHL.push({id:'l'+Date.now()+i,itemId:WH[WH.length-1].id,type:'in',qty:it.acceptQty||it.contractQty,bf:0,af:it.acceptQty||it.contractQty,op:'验收单导入',dt:date,note:'合同金额 ¥'+(info.amount||'-')+'  |  供应商 '+info.supplier});
    added++;
  }
  sv();cmImp();rWh();t('成功导入 '+added+' 项，分类:'+cat+' 库房:'+(WH_LOCS[loc]||loc),'s');
}

// ========== 日期占用总览 ==========
function renderDateOverview(){
  var container = document.getElementById('ovTimeline');
  var listEl = document.getElementById('ovList');
  var countEl = document.getElementById('dateOvCount');
  if(!container || !listEl) return;
  if(!BK || BK.length === 0){
    container.innerHTML = '<div style="color:var(--slate-400);font-size:12px;padding:8px 0;">暂无排房记录</div>';
    listEl.innerHTML = '';
    if(countEl) countEl.textContent = '（无记录）';
    return;
  }
  var today = new Date(); today.setHours(0,0,0,0);
  // 按入住日期排序
  var sorted = BK.slice().sort(function(a,b){ return (a.df||'').localeCompare(b.df||''); });
  var html = '';
  var listHtml = '';
  var nowCount = 0;
  sorted.forEach(function(bk){
    if(bk.st==='c')return;
    var df = bk.df||'', dt = bk.dt||'';
    if(!df) return;
    var dFrom = new Date(df);
    var dTo = new Date(dt);
    dFrom.setHours(0,0,0,0);
    dTo.setHours(0,0,0,0);
    var status, color;
    if(today >= dFrom && today <= dTo){ status='进行中'; color='var(--blue)'; nowCount++; }
    else if(today < dFrom){ status='即将开始'; color='var(--amber)'; }
    else { status='已结束'; color='var(--slate-300)'; }
    var dep = bk.dep||bk.g||'未知部门';
    var pur = bk.pur||'';
    var rooms = (bk.rooms||[]).length;
    // 时间条
    html += '<div class="ov-bar" style="background:'+color+';" title="'+dep+' '+df+'~'+dt+'">'
          + '<span>'+dep+'</span>'
          + '<span class="ov-dates">'+df.slice(5)+' ~ '+dt.slice(5)+'</span>'
          + '<span style="font-size:10px;opacity:0.8;">'+rooms+'间</span>'
          + '</div>';
    // 列表项
    listHtml += '<div class="ov-item">'
          + '<span class="ov-status" style="background:'+color+'"></span>'
          + '<span class="ov-range">'+df+' ~ '+dt+'</span>'
          + '<span class="ov-dep">'+dep+'</span>'
          + '<span class="ov-rooms">'+rooms+'间'+(pur?' · '+pur:'')+'</span>'
          + '</div>';
  });
  container.innerHTML = html || '<div style="color:var(--slate-400);font-size:12px;">暂无数据</div>';
  listEl.innerHTML = listHtml;
  if(countEl) countEl.textContent = '（共 '+BK.length+' 条，'+nowCount+' 条进行中）';
}


// ========== 导出/导入数据 ==========
function expData(){
  var data={bk:BK,wh:WH,whl:WHL};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='排房数据_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function impData(){
  document.getElementById('impFile').click();
}

function handleImp(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!confirm('导入将覆盖当前数据，确认继续？'))return;
      BK=data.bk||[];
      WH=data.wh||[];
      WHL=data.whl||[];
      sv();
      alert('✅ 导入成功！共 '+BK.length+' 条排房记录');
      // 刷新所有页面
      if(typeof iPf==='function')iPf();
      if(typeof iZl==='function')iZl();
      if(typeof rWh==='function')rWh();
      if(typeof renderDateOverview==='function')renderDateOverview();
    }catch(err){alert('❌ 文件格式错误：'+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}
