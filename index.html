<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>排房管理系统</title>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-light:#1a2d4d;
  --slate-50:#fafbfc;--slate-100:#f3f5f7;--slate-200:#e5e9ed;--slate-300:#d0d6dd;--slate-400:#94a3b8;--slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b;
  --blue:#1e40af;--blue-dark:#1e3a8a;--blue-light:#eef4ff;
  --green:#059669;--green-light:#ecfdf5;--green-dark:#047857;
  --red:#b91c1c;--red-light:#fef2f2;
  --champagne:#c9a96e;--champagne-light:#faf5eb;--champagne-dark:#a68a4b;--champagne-glow:rgba(201,169,110,0.25);
  --gold:#b8860b;--gold-light:#fef3c7;--gold-dark:#92600a;
  --amber:#d97706;--amber-light:#fffbeb;
  --indigo:#4f46e5;--indigo-light:#eef2ff;
  --radius:10px;--radius-sm:6px;--radius-md:8px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(10,22,40,0.05),0 1px 2px rgba(10,22,40,0.03);
  --shadow-md:0 4px 12px rgba(10,22,40,0.08),0 2px 4px rgba(10,22,40,0.04);
  --shadow-lg:0 10px 30px rgba(10,22,40,0.12),0 4px 10px rgba(10,22,40,0.06);
  --shadow-gold:0 4px 16px rgba(201,169,110,0.2);
  --transition:200ms cubic-bezier(0.4,0,0.2,1);
}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--slate-50);color:var(--slate-700);line-height:1.5}
button{cursor:pointer;font:inherit;color:inherit;border:none;background:none}
input,select,textarea{font:inherit}
.header{background:linear-gradient(135deg,var(--navy) 0%,#162240 60%,var(--navy-light) 100%);color:#fff;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,22,40,0.25);border-bottom:2px solid var(--champagne)}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px;letter-spacing:1px;color:#fff}
.header-logo svg{width:22px;height:22px;color:var(--champagne)}
.header-logo span{background:linear-gradient(90deg,#fff,var(--champagne-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-tabs{display:flex;gap:4px;margin-left:28px}
.header-tab{padding:7px 20px;border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);transition:all var(--transition);position:relative}
.header-tab:hover{background:rgba(255,255,255,0.08);color:#fff}
.header-tab.act{background:linear-gradient(135deg,rgba(201,169,110,0.2),rgba(201,169,110,0.1));color:var(--champagne-light);font-weight:600;box-shadow:inset 0 0 0 1px rgba(201,169,110,0.3)}
.toolbar{background:#fff;border-bottom:1px solid var(--slate-200);padding:14px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:var(--shadow)}
.toolbar-group{display:flex;align-items:center;gap:6px}
.toolbar-label{font-size:12px;font-weight:600;color:var(--slate-500);white-space:nowrap;letter-spacing:0.3px}
.toolbar-select{padding:6px 14px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;color:var(--slate-700);background:#fff;outline:none;cursor:pointer;transition:all var(--transition)}.toolbar-select:focus{border-color:var(--champagne);box-shadow:0 0 0 2px var(--champagne-glow)}
.toolbar-date{padding:6px 14px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;color:var(--slate-700);background:#fff;outline:none;transition:all var(--transition)}.toolbar-date:focus{border-color:var(--champagne);box-shadow:0 0 0 2px var(--champagne-glow)}
.toolbar-divider{width:1px;height:24px;background:var(--slate-200)}
.stats-bar{display:flex;background:#fff;border-bottom:1px solid var(--slate-200);padding:0 28px;overflow-x:auto;box-shadow:var(--shadow)}
.stat-item{display:flex;align-items:center;gap:10px;padding:14px 24px;border-right:1px solid var(--slate-100)}
.stat-item:last-child{border-right:none}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.stat-icon svg{width:18px;height:18px}
.stat-value{font-size:20px;font-weight:800;color:var(--slate-800)}
.stat-label{font-size:11px;color:var(--slate-500);font-weight:500;letter-spacing:0.3px}
.stat-icon.b11{background:var(--blue-light);color:var(--blue)}
.stat-icon.b12{background:var(--indigo-light);color:var(--indigo)}
.stat-icon.avl{background:var(--green-light);color:var(--green-dark)}
.stat-icon.bkd{background:var(--red-light);color:var(--red)}
.stat-icon.wh{background:var(--amber-light);color:var(--amber)}
.main{padding:24px 28px 40px;max-width:1440px;margin:0 auto}
.page{display:none}
.page.act{display:block}
.floor-section{margin-bottom:32px}
.floor-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:4px 0}
.floor-header h3{font-size:16px;font-weight:700;color:var(--navy);letter-spacing:0.3px}
.floor-header .fb{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;font-size:10px;font-weight:700;padding:4px 12px;border-radius:10px;box-shadow:var(--shadow);letter-spacing:0.5px}
.floor-header .fc{font-size:11px;color:var(--slate-400);margin-left:auto}
.floor-header .fc span{font-weight:600;color:var(--champagne-dark)}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
#rc{position:relative;user-select:none}
.room-card{background:#fff;border-radius:var(--radius-sm);border:1.5px solid var(--slate-200);padding:10px 6px;cursor:pointer;text-align:center;user-select:none;position:relative;transition:all 250ms cubic-bezier(0.4,0,0.2,1);overflow:hidden}
.room-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--slate-300)}
.room-card .rn{font-size:16px;font-weight:800;color:var(--navy);letter-spacing:0.5px}
.room-card .rt{font-size:10px;color:var(--slate-400);letter-spacing:0.3px}
.room-card .rd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-top:3px}
.room-card .rnm{font-size:9px;color:var(--slate-500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-card.avl{border-left:3px solid var(--green);background:linear-gradient(180deg,#fff 0%,var(--slate-50) 100%)}
.room-card.avl::after{content:'';position:absolute;top:0;right:0;width:16px;height:16px;background:var(--green);border-radius:0 0 0 14px;opacity:0.08;transition:opacity var(--transition)}
.room-card.avl:hover::after{opacity:0.15}
.room-card.avl .rd{background:var(--green)}
.room-card.bkd{border-left:3px solid var(--red);background:var(--red-light);cursor:default;opacity:0.7}
.room-card.bkd .rd{background:var(--red)}
.room-card.bkd .rnm{color:var(--red);font-weight:500}
.room-card.sel{border:2px solid var(--champagne);background:linear-gradient(180deg,var(--champagne-light) 0%,#fff 100%);box-shadow:0 0 0 2px var(--champagne-glow),0 3px 12px rgba(201,169,110,0.2)}
.room-card.sel .rd{background:var(--champagne)}
.room-card.sel .rnm{color:var(--champagne-dark)}
.room-card.sel:hover{transform:translateY(-1px)}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0 1.5px var(--champagne),0 3px 10px var(--champagne-glow)}50%{box-shadow:0 0 0 2px var(--champagne),0 4px 16px rgba(201,169,110,0.35)}}
.room-card .rst{font-size:9px;margin-top:1px}.room-card .rbb{font-size:9px;color:var(--red);margin-top:3px}
/* 拖动选择框 */
.sel-box{position:absolute;border:2px dashed var(--blue);background:rgba(30,64,175,0.08);pointer-events:none;z-index:50;display:none;border-radius:4px;}
/* 房间卡片拖动选择状态 */
.room-card.dragging{border-color:var(--blue);box-shadow:0 0 0 2px rgba(30,64,175,0.3);}
.room-card.just-selected{animation:selectPulse 0.3s ease-out;}
@keyframes selectPulse{0%{transform:scale(1);}50%{transform:scale(1.05);}100%{transform:scale(1);}}
.floor-tabs{display:flex;gap:4px;flex-wrap:wrap}
.floor-tab{padding:5px 14px;border-radius:14px;font-size:12px;font-weight:500;color:var(--slate-600);background:var(--slate-100);transition:all var(--transition)}
.floor-tab:hover{background:var(--slate-200)}
.floor-tab.act{background:var(--navy);color:#fff;box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;white-space:nowrap;transition:all var(--transition)}
.btn svg{width:14px;height:14px}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 4px rgba(30,64,175,0.3)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--slate-100);color:var(--slate-700)}
.btn-success{background:linear-gradient(135deg,var(--champagne),var(--champagne-dark));color:#fff;box-shadow:var(--shadow-gold);font-weight:600;letter-spacing:0.5px}
.btn-success:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.btn-danger{background:var(--red);color:#fff;box-shadow:0 2px 4px rgba(185,28,28,0.3)}
.btn-sm{padding:4px 10px;font-size:12px}
.bp{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-lg);padding:28px;margin-bottom:24px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.bp::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--champagne),var(--champagne-dark),var(--champagne))}
.bp h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:8px;padding-bottom:14px;border-bottom:1px solid var(--slate-200);letter-spacing:0.5px}
.bp h3 svg{color:var(--champagne)}
.bp .fr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg{margin-bottom:0}
.fl{display:block;font-size:12px;font-weight:600;color:var(--slate-700);margin-bottom:5px;letter-spacing:0.3px}
.fl .rq{color:var(--red)}
.fi{width:100%;padding:8px 12px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;color:var(--slate-800);background:#fff;transition:all var(--transition)}.fi:hover{border-color:var(--slate-300)}
.fi:focus{outline:none;border-color:var(--champagne);box-shadow:0 0 0 3px var(--champagne-glow)}
/* 选择结果操作栏（地板底下） */
.sel-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-sm);margin-top:16px;box-shadow:var(--shadow);flex-wrap:wrap}
.sel-bar-info{font-size:13px;color:var(--slate-600)}.sel-bar-info strong{font-weight:800;color:var(--navy);font-size:18px}
.sel-bar-acts{display:flex;gap:8px}
/* 房间卡片内姓名输入 */
.rc-names{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.rc-names .ni{width:100%;border:1px solid var(--slate-200);border-radius:3px;background:rgba(255,255,255,0.7);font-size:9px;padding:3px 4px;outline:none;text-align:center;transition:all var(--transition);height:20px;max-width:72px;margin:0 auto}
.rc-names .ni:focus{border-color:var(--champagne);background:#fff;box-shadow:0 0 0 2px var(--champagne-glow)}
.rc-toggle{display:inline-flex;align-items:center;gap:1px;padding:1px 5px;border-radius:4px;font-size:8px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.7);color:var(--slate-500);border:1px solid var(--slate-200);transition:all var(--transition);white-space:nowrap;margin-top:3px}.rc-toggle:hover{background:var(--champagne-light);color:var(--champagne-dark);border-color:var(--champagne)}
.tg-lbl{font-size:13px;color:var(--slate-600);cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none}
.rtag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;background:var(--blue-light);color:var(--blue);border:1px solid rgba(30,64,175,0.15);transition:all var(--transition)}.rtag:hover{background:var(--blue);color:#fff}
.rtag .rdel{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;cursor:pointer}
.sc-list{display:flex;flex-direction:column;gap:12px}
.sc-card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-sm);padding:14px 18px;box-shadow:var(--shadow);transition:box-shadow var(--transition)}
.sc-card:hover{box-shadow:var(--shadow-md)}
.sc-card .sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sc-card .scd{font-size:14px;font-weight:600;color:var(--slate-800);display:flex;align-items:center;gap:6px}
.sc-card .sdd{font-size:12px;color:var(--slate-500)}
.sc-card .scr{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.sc-card .srt2{padding:2px 8px;background:var(--slate-100);border-radius:4px;font-size:12px;color:var(--slate-700);font-weight:500}
.sc-card .sci{font-size:12px;color:var(--slate-500);margin-top:6px;display:flex;gap:16px;flex-wrap:wrap}
.sc-card .sca{margin-top:8px;display:flex;gap:6px}
.scard{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
.scard h3{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.scard h3 svg{color:var(--champagne)}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:6px 8px;color:var(--slate-400);font-weight:500;border-bottom:1px solid var(--slate-200);font-size:12px}
.st td{padding:6px 8px;border-bottom:1px solid var(--slate-100);color:var(--slate-700)}
.st tr:hover td{background:var(--slate-50)}
.st .rl{font-size:12px;color:var(--slate-500)}
.emp{text-align:center;padding:50px 20px;color:var(--slate-400)}
.emp svg{width:44px;height:44px;margin-bottom:10px;opacity:0.4}
.emp p{font-size:14px}
.mod{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.mod.open{display:flex}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.2);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:su 200ms ease}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--slate-200)}
.mh h3{font-size:15px;font-weight:600;color:var(--slate-800);display:flex;align-items:center;gap:8px}
.mc{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--slate-400)}
.mc:hover{background:var(--slate-100);color:var(--slate-600)}
.mb{padding:16px 20px}
.mf{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--slate-200);background:var(--slate-50);border-radius:0 0 12px 12px}
.tc{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.tt{padding:10px 16px;border-radius:6px;background:var(--navy);color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;animation:su 200ms ease}
.ni{width:50px;border:none;border-bottom:1px dashed var(--slate-300);background:transparent;font-size:12px;padding:0 2px;outline:none}
.ni:focus{border-bottom-color:var(--blue)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:3px}

.bill-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.bill-table th,.bill-table td{border:1px solid var(--slate-200);padding:6px 8px;text-align:center;font-size:12px}
.bill-table th{background:var(--slate-50);font-weight:600;color:var(--slate-600);font-size:11px;letter-spacing:0.3px}
.bill-table .ni2{width:64px;border:1px solid var(--slate-200);border-radius:4px;background:var(--slate-50);font-size:12px;padding:5px 8px;outline:none;text-align:center;transition:all var(--transition)}
.bill-table .ni2:focus{border-color:var(--champagne);background:#fff;box-shadow:0 0 0 2px var(--champagne-glow)}
.bill-table .ni3{width:64px;border:1px solid var(--slate-200);border-radius:4px;background:var(--slate-50);font-size:12px;padding:5px 8px;outline:none;text-align:center;transition:all var(--transition)}
.bill-table .ni3:focus{border-color:var(--champagne);background:#fff;box-shadow:0 0 0 2px var(--champagne-glow)}
.bill-table .rdel2{color:var(--red);cursor:pointer;font-size:16px;font-weight:700;transition:color var(--transition)}
.bill-table .rdel2:hover{color:#991b1b}
.bill-table .room-num{font-weight:700;font-size:14px}

/* === 库房管理系统 === */
.wh-tabs{display:flex;gap:4px;margin-bottom:16px}
.wh-tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;color:var(--slate-600);background:var(--slate-100)}
.wh-tab:hover{background:var(--slate-200)}
.wh-tab.act{background:var(--navy);color:#fff}
/* KPI 卡片 */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid var(--slate-200);border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px}
.kpi-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:22px;height:22px}
.kpi-val{font-size:26px;font-weight:700;color:var(--slate-800);line-height:1.1}
.kpi-label{font-size:11px;color:var(--slate-500)}
.kpi-sub{font-size:10px;color:var(--slate-400);margin-top:1px}
.kpi-icon.ki-blue{background:var(--blue-light);color:var(--blue)}
.kpi-icon.ki-green{background:var(--green-light);color:var(--green-dark)}
.kpi-icon.ki-amber{background:var(--amber-light);color:var(--amber)}
.kpi-icon.ki-red{background:var(--red-light);color:var(--red)}
.kpi-icon.ki-purple{background:#f3e8ff;color:#7c3aed}
/* 二级行 */
.row2{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:20px}
/* 物品卡片网格 */
.wh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.wh-card{background:#fff;border:1px solid var(--slate-200);border-radius:8px;padding:14px 16px;transition:box-shadow var(--transition)}
.wh-card:hover{box-shadow:var(--shadow-lg)}
.wh-card .wc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.wh-card .wc-code{font-size:10px;font-family:monospace;color:var(--slate-400);background:var(--slate-100);padding:1px 6px;border-radius:3px}
.wh-card .wc-cat{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.wh-card .wc-cat.bc{background:var(--blue-light);color:var(--blue)}
.wh-card .wc-cat.kf{background:var(--red-light);color:var(--red)}
.wh-card .wc-cat.cl{background:var(--green-light);color:var(--green-dark)}
.wh-card .wc-cat.wx{background:var(--amber-light);color:var(--amber)}
.wh-card .wc-cat.bg{background:var(--indigo-light);color:var(--indigo)}
.wh-card .wc-cat.gd{background:#f3e8ff;color:#7c3aed}
.wh-card .wc-cat.qt{background:var(--slate-200);color:var(--slate-600)}
.wh-card .wc-name{font-size:14px;font-weight:600;color:var(--slate-800);margin-bottom:8px}
.wh-card .wc-main{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.wh-card .wc-qty{font-size:22px;font-weight:700}
.wh-card .wc-unit{font-size:11px;color:var(--slate-500)}
.wh-card .wc-bar-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.wh-card .wc-bar{width:80px;height:6px;background:var(--slate-200);border-radius:3px;overflow:hidden}
.wh-card .wc-bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width 300ms}
.wh-card .wc-bar-fill.low{background:var(--red)}
.wh-card .wc-bar-fill.warn{background:var(--amber)}
.wh-card .wc-lvl{font-size:11px;font-weight:600}.wc-lvl.ok{color:var(--green)}.wc-lvl.warn{color:var(--amber)}.wc-lvl.low{color:var(--red)}
.wh-card .wc-info{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--slate-500);margin-bottom:8px}
.wh-card .wc-acts{display:flex;gap:5px;padding-top:8px;border-top:1px solid var(--slate-100)}
.wh-card .wc-btn{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--slate-200);background:#fff;color:var(--slate-600)}
.wh-card .wc-btn:hover{background:var(--slate-100)}
/* 出入库记录标签 */
.tag-in{background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-out{background:var(--red-light);color:var(--red);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-check{background:#f3e8ff;color:#7c3aed;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
/* 导入验收单 */
.imp-zone{border:2px dashed var(--slate-300);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all var(--transition);background:var(--slate-50)}
.imp-zone:hover{border-color:var(--blue);background:var(--blue-light)}
.imp-zone.drag{border-color:var(--blue);background:var(--blue-light)}
.imp-zone svg{width:36px;height:36px;color:var(--slate-400);margin-bottom:8px}
.imp-zone .iz-title{font-size:14px;font-weight:600;color:var(--slate-600)}
.imp-zone .iz-sub{font-size:12px;color:var(--slate-400);margin-top:4px}
.imp-preview{max-height:400px;overflow-y:auto;margin-top:16px}
.imp-preview table{font-size:11px}
.imp-preview th{position:sticky;top:0;background:var(--slate-100);z-index:1;font-size:11px}
.imp-preview td{padding:4px 6px}
.imp-meta{display:flex;gap:16px;flex-wrap:wrap;padding:12px;background:var(--slate-50);border-radius:6px;margin-bottom:12px;font-size:12px}
.imp-meta .im-row{display:flex;align-items:center;gap:4px}
.imp-meta .im-label{color:var(--slate-400)}.imp-meta .im-val{font-weight:600;color:var(--slate-700)}
.imp-summary{font-size:12px;color:var(--slate-500);margin:10px 0}
/* 盘点结果 */
.check-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--slate-100)}
.check-row .cr-name{flex:1;font-size:13px}
.check-row .cr-qty{font-size:13px;font-weight:600;text-align:right;min-width:50px}
/* 预警列表 */
.alert-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--red-light);border-radius:6px;margin-bottom:6px;font-size:12px}
.alert-item .al-name{font-weight:600;color:var(--red)}
.alert-item .al-qty{color:var(--slate-600)}
.alert-item .al-act{margin-left:auto}

/* ===== 全局美化样式 ===== */

/* 页面切换动画 */
.page{
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn{
  from{
    opacity: 0;
    transform: translateY(10px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

/* 卡片悬浮效果 */
.scard, .wh-card, .room-card{
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.scard:hover, .wh-card:hover{
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* 表格美化 */
.st{
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
}
.st th{
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--slate-500);
  border-bottom: 2px solid var(--champagne);
  letter-spacing: 0.3px;
  background: var(--slate-50);
}
.st td{
  padding: 10px 12px;
  font-size: 13px;
  vertical-align: middle;
  border-bottom: 1px solid var(--slate-100);
  transition: background 0.2s;
}
.st tr:hover td{
  background: var(--champagne-light);
}
.st tr:last-child td{
  border-bottom: none;
}

/* 滚动条美化 */
::-webkit-scrollbar{
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track{
  background: var(--slate-100);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb{
  background: var(--slate-300);
  border-radius: 3px;
  transition: background 0.2s;
}
::-webkit-scrollbar-thumb:hover{
  background: var(--slate-400);
}

/* 输入框聚焦动画 */
.fi:focus{
  transform: translateY(-1px);
}

/* 按钮点击动画 */
.btn:active{
  transform: translateY(0) scale(0.98);
}

/* 房间卡片美化 */
.room-card{
  border: 1.5px solid var(--slate-200);
  border-radius: var(--radius-md);
  padding: 10px 8px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  background: #fff;
  position: relative;
  overflow: hidden;
}
.room-card::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--slate-200);
  transition: background 0.3s;
}
.room-card:hover{
  border-color: var(--blue);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.room-card:hover::before{
  background: var(--blue);
}
.room-card.sel::before{
  background: var(--blue);
}

/* 空状态美化 */
.emp{
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--slate-400);
  text-align: center;
}
.emp svg{
  width: 48px;
  height: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.emp p{
  font-size: 14px;
  color: var(--slate-500);
}

/* Toast通知美化 */
.tt{
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  animation: slideIn 0.3s ease-out;
  box-shadow: var(--shadow-md);
}
@keyframes slideIn{
  from{
    opacity: 0;
    transform: translateX(100%);
  }
  to{
    opacity: 1;
    transform: translateX(0);
  }
}

/* 模态框美化 */
.modal{
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: modalIn 0.3s ease-out;
}
@keyframes modalIn{
  from{
    opacity: 0;
    transform: scale(0.9) translateY(20px);
  }
  to{
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
.mh{
  padding: 16px 20px;
  border-bottom: 1px solid var(--slate-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mh h3{
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
}
.mc{
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--slate-100);
  color: var(--slate-500);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}
.mc:hover{
  background: var(--red);
  color: #fff;
}

@media(max-width:768px){
  .header{padding:0 16px}.header-logo span{display:none}.header-tabs{gap:2px;margin-left:12px}.header-tab{padding:4px 10px;font-size:12px}
  .toolbar{padding:10px 16px}.stats-bar{overflow-x:auto;padding:0 16px}.stat-item{padding:8px 12px}.stat-value{font-size:15px}
  .main{padding:16px}.room-grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px}
  .bp .fr{grid-template-columns:1fr}.modal{max-width:100%;margin:10px}
  .kpi-row{grid-template-columns:1fr 1fr}.row2{grid-template-columns:1fr}.wh-grid{grid-template-columns:1fr}
}

/* ===== 房间占用日历 ===== */
.date-overview{border:1px solid var(--slate-200);border-radius:var(--radius-lg);margin:18px 28px 22px;background:#fff;overflow:hidden;box-shadow:var(--shadow)}
.date-ov-header{display:flex;align-items:center;gap:10px;padding:14px 20px;cursor:pointer;background:linear-gradient(to right,var(--slate-50),#fff);border-bottom:1px solid var(--slate-200);transition:background var(--transition);user-select:none}
.date-ov-header:hover{background:var(--slate-100)}
.date-ov-header i.rotated{transform:rotate(-90deg)}
.date-ov-body{padding:20px}
.date-ov-body.hide{display:none}

/* 导航 */
.ov-nav{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.ov-nav-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--slate-200);background:#fff;color:var(--slate-500);cursor:pointer;font-size:14px;transition:all var(--transition)}
.ov-nav-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.ov-nav-title{font-size:17px;font-weight:700;color:var(--navy);min-width:110px;text-align:center;letter-spacing:1px}
.ov-nav-spacer{flex:1}
.ov-nav-select{padding:5px 14px;border:1.5px solid var(--slate-200);border-radius:20px;font-size:12px;font-weight:500;color:var(--slate-600);background:#fff;outline:none;cursor:pointer;transition:all var(--transition)}
.ov-nav-select:focus{border-color:var(--champagne)}

/* 日历网格 */
.ov-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.ov-cal .wkd{text-align:center;font-size:10px;font-weight:700;color:var(--slate-400);padding:4px 0 8px;letter-spacing:0.5px;text-transform:uppercase}
.ov-cal .wkd.wk{color:var(--red);opacity:0.6}

/* 日期格子 */
.ov-cal .day{position:relative;border-radius:8px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all 180ms ease;cursor:pointer;user-select:none}
.ov-cal .day.empty{pointer-events:none;opacity:0}
.ov-cal .day .dn{font-size:14px;font-weight:700;line-height:1}
.ov-cal .day .oc{font-size:10px;font-weight:600;line-height:1}

/* 空闲 */
.ov-cal .day.free{background:var(--slate-50);border:1px solid transparent}
.ov-cal .day.free .dn{color:var(--slate-400)}
.ov-cal .day.free .oc{color:var(--slate-400);opacity:0}

/* 占用 */
.ov-cal .day.occ{background:var(--blue);border:1px solid var(--blue-dark)}
.ov-cal .day.occ .dn{color:#fff}
.ov-cal .day.occ .oc{color:rgba(255,255,255,0.85)}

/* 今日 */
.ov-cal .day.today{box-shadow:inset 0 0 0 2.5px var(--champagne),0 0 0 3px var(--champagne-glow);z-index:1}
.ov-cal .day.today.free{background:#fff;border:1px solid var(--champagne)}
.ov-cal .day.today.free .dn{color:var(--navy)}

/* 过去 */
.ov-cal .day.past{opacity:0.3;pointer-events:none}

/* 选中态 */
.ov-cal .day.sel{box-shadow:inset 0 0 0 2.5px var(--navy),0 0 0 3px rgba(10,22,40,0.15) !important;z-index:2;transform:scale(1.06)}
.ov-cal .day.sel.occ{background:var(--blue-dark) !important}

/* 日期信息条 */
.ov-info{display:none;align-items:center;gap:16px;margin-top:14px;padding:10px 16px;background:linear-gradient(135deg,var(--champagne-light),#fff);border:1px solid var(--champagne);border-radius:var(--radius-sm);font-size:12px;color:var(--slate-600);flex-wrap:wrap}
.ov-info.show{display:flex}
.ov-info .oi-date{font-weight:700;color:var(--navy)}
.ov-info .oi-stat{font-size:11px;color:var(--slate-500)}
.ov-info .oi-stat strong{color:var(--navy);font-size:13px}

/* Hover */
.ov-cal .day:not(.empty):not(.past):hover{transform:scale(1.06);box-shadow:var(--shadow-md);z-index:2}

/* 底部统计 */
.ov-summary{display:flex;align-items:center;gap:24px;margin-top:16px;padding:12px 18px;background:linear-gradient(135deg,var(--slate-50),#fff);border-radius:var(--radius-sm);border:1px solid var(--slate-100);font-size:12px;color:var(--slate-500);flex-wrap:wrap}
.ov-summary .s-item{display:flex;align-items:center;gap:6px}
.ov-summary .s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ov-summary .s-num{font-size:18px;font-weight:800;color:var(--navy)}
.ov-summary .s-num.red{color:var(--red)}
.ov-summary .s-num.green{color:var(--green-dark)}
.ov-summary .s-label{font-size:11px;color:var(--slate-400)}

/* 日期范围列表 */
.ov-ranges{margin-top:14px;display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
.ov-range-row{display:flex;align-items:center;gap:10px;padding:5px 12px;border-radius:6px;font-size:12px;transition:background var(--transition)}
.ov-range-row:hover{background:var(--slate-50)}
.ov-range-row .rr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ov-range-row .rr-dates{font-size:11px;color:var(--slate-500);min-width:130px;font-family:'SF Mono','Menlo',monospace}
.ov-range-row .rr-dep{font-weight:600;color:var(--navy);min-width:70px}
.ov-range-row .rr-info{font-size:10px;color:var(--slate-400)}
.ov-range-row .rr-rooms{font-weight:700;color:var(--blue);margin-left:auto}
.ov-range-header{font-size:10px;font-weight:600;color:var(--slate-400);padding:4px 12px;border-bottom:1px solid var(--slate-100);margin-bottom:4px;letter-spacing:0.5px}

#dateOvBody.hide{display:none}
.ni2{width:100%;padding:5px 8px;border:1px solid var(--slate-200);border-radius:4px;font-size:12px;outline:none;transition:all var(--transition);background:var(--slate-50)}.ni2:focus{border-color:var(--champagne);background:#fff;box-shadow:0 0 0 2px var(--champagne-glow)}.ni3{width:100%;padding:5px 8px;border:1px solid var(--slate-200);border-radius:4px;font-size:12px;outline:none;transition:all var(--transition);background:var(--slate-50)}.ni3:focus{border-color:var(--champagne);background:#fff;box-shadow:0 0 0 2px var(--champagne-glow)}.bill-table{width:100%;border-collapse:collapse;}.bill-table th{padding:7px 8px;text-align:left;font-size:11px;font-weight:600;color:var(--slate-500);border-bottom:2px solid var(--champagne);letter-spacing:0.3px}.bill-table td{padding:7px 8px;font-size:13px;vertical-align:middle;border-bottom:1px solid var(--slate-100)}.rdel2{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--slate-100);color:var(--slate-500);font-size:12px;cursor:pointer;transition:all var(--transition)}.rdel2:hover{background:var(--red);color:#fff}

/* 房型切换按钮 — 精致小药丸 */
.rt-toggle{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;background:var(--slate-100);color:var(--slate-500);border:1px solid var(--slate-200);transition:all var(--transition);margin-left:4px;white-space:nowrap}
.rt-toggle:hover{background:var(--champagne-light);color:var(--champagne-dark);border-color:var(--champagne)}
/* 房间类型徽章 - 酒店房卡风格 */
.rt-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:0.5px;line-height:1.6;white-space:nowrap;transition:all var(--transition)}
.rt-badge.rt-sgl{background:linear-gradient(135deg,#eef4ff 0%,#dbeafe 100%);color:var(--blue);border:1px solid rgba(30,64,175,0.2);box-shadow:0 1px 2px rgba(30,64,175,0.08)}
.rt-badge.rt-dbl{background:linear-gradient(135deg,var(--champagne-light) 0%,#f5e6c8 100%);color:var(--champagne-dark);border:1px solid rgba(201,169,110,0.35);box-shadow:0 1px 2px rgba(201,169,110,0.12)}
.rt-badge.rt-sgl-sm{background:linear-gradient(135deg,#eef4ff 0%,#dbeafe 100%);color:var(--blue);font-size:10px;padding:3px 11px;border-radius:10px;border:1px solid rgba(30,64,175,0.18);box-shadow:0 1px 2px rgba(30,64,175,0.06)}
.rt-badge.rt-dbl-sm{background:linear-gradient(135deg,var(--champagne-light) 0%,#f5e6c8 100%);color:var(--champagne-dark);font-size:10px;padding:3px 11px;border-radius:10px;border:1px solid rgba(201,169,110,0.3);box-shadow:0 1px 2px rgba(201,169,110,0.08)}
/* 已选房间类型标记 */
.room-card .rt-badge{margin:1px auto 3px}
/* 选中态 - 单间(默认，蓝色典雅) */
.room-card.sel[data-type="single"]{border-left:3px solid var(--blue) !important;background:linear-gradient(135deg,#eef4ff 0%,#dbeafe 100%) !important;box-shadow:0 0 0 1.5px var(--blue),0 4px 14px rgba(30,64,175,0.18) !important}
.room-card.sel[data-type="single"] .rn{color:var(--blue-dark) !important}
.room-card.sel[data-type="single"] .rnm{color:var(--blue) !important}
.room-card.sel[data-type="single"] .rd{background:var(--blue) !important}
/* 选中态 - 标间(手动切换后，金色尊享) */
.room-card.sel[data-type="double"]{border-left:3px solid var(--champagne) !important;background:linear-gradient(135deg,var(--champagne-light) 0%,#f5e6c8 100%) !important;box-shadow:0 0 0 1.5px var(--champagne),0 4px 14px var(--champagne-glow) !important}
.room-card.sel[data-type="double"] .rn{color:var(--champagne-dark) !important}
.room-card.sel[data-type="double"] .rnm{color:var(--champagne-dark) !important}
.room-card.sel[data-type="double"] .rd{background:var(--champagne) !important}
/* 输入框统一风格 */
.ni{width:100%;border:none;border-bottom:1.5px dashed var(--slate-300);background:transparent;font-size:12px;padding:2px 4px;outline:none;transition:border var(--transition)}
.ni:focus{border-bottom-color:var(--champagne);border-bottom-style:solid}
.ni2,.ni3{flex:1;padding:5px 8px;border:1px solid var(--slate-200);border-radius:4px;font-size:12px;outline:none;transition:all var(--transition);background:var(--slate-50)}
.ni2:focus,.ni3:focus{border-color:var(--champagne);background:#fff;box-shadow:0 0 0 2px var(--champagne-glow)}

/* 必填标记美化 */
.rq{
  color: #ef4444;
  font-weight: 700;
  margin-left: 2px;
}

/* 房间类型选择器 */
.room-type-selector{
  margin-bottom: 16px;
  padding: 12px 16px;
  background: linear-gradient(135deg, var(--slate-50) 0%, #fff 100%);

}
.room-type-selector .fl{
  margin-bottom: 8px;
  display: block;
}
.rt-toggle-group{
  display: flex;

}
.rt-toggle-btn{
  flex: 1;
  padding: 10px 16px;
  border: 2px solid var(--slate-200);
  border-radius: var(--radius-sm);
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

.rt-icon{font-size:20px;display:block;margin-bottom:2px;}
.rt-label{font-size:14px;font-weight:700;display:block;}
.rt-sub{font-size:10px;color:var(--slate-400);display:block;margin-top:1px;}
.rt-toggle-btn.active .rt-sub{color:inherit;opacity:0.7;}

/* 表单分步样式 */
.form-section{
  background: var(--slate-50);

}
.form-section-title{

var _drag = {active: false, startX: 0, startY: 0, mode: 'add', processed: {}, inited: false};

function initDragSelect(){
  if(_drag.inited) return; // 避免重复绑定
  _drag.inited = true;
  var rc = document.getElementById('rc');
  if(!rc) return;
  rc.addEventListener('mousedown', function(e){
    var card = e.target.closest('.room-card');
    if(!card || card.classList.contains('bkd')) return;
    if(e.target.tagName === 'INPUT') return; // 不拦截输入框
    e.preventDefault();
    _drag.active = true;
    _drag.mode = card.classList.contains('sel') ? 'remove' : 'add';
    _drag.processed = {};
    var num = parseInt(card.getAttribute('data-num'));
    var bld = parseInt(card.getAttribute('data-bld'));
    _drag.processed[num + '_' + bld] = true;
    cr(num);
    var box = document.getElementById('selBox');
    var rect = rc.getBoundingClientRect();
    _drag.startX = e.clientX - rect.left + rc.scrollLeft;
    _drag.startY = e.clientY - rect.top + rc.scrollTop;
    box.style.left = _drag.startX + 'px';
    box.style.top = _drag.startY + 'px';
    box.style.width = '0px';
    box.style.height = '0px';
    box.style.display = 'block';
  });
  rc.addEventListener('mousemove', function(e){
    if(!_drag.active) return;
    var box = document.getElementById('selBox');
    var rect = rc.getBoundingClientRect();
    var curX = e.clientX - rect.left + rc.scrollLeft;
    var curY = e.clientY - rect.top + rc.scrollTop;
    var x = Math.min(_drag.startX, curX);
    var y = Math.min(_drag.startY, curY);
    var w = Math.abs(curX - _drag.startX);
    var h = Math.abs(curY - _drag.startY);
    box.style.left = x + 'px';
    box.style.top = y + 'px';
    box.style.width = w + 'px';
    box.style.height = h + 'px';
    var boxRect = {left: x, top: y, right: x + w, bottom: y + h};
    var cards = rc.querySelectorAll('.room-card:not(.bkd)');
    for(var i = 0; i < cards.length; i++){
      var cr2 = cards[i].getBoundingClientRect();
      var crRel = {
        left: cr2.left - rect.left + rc.scrollLeft,
        top: cr2.top - rect.top + rc.scrollTop,
        right: cr2.right - rect.left + rc.scrollLeft,
        bottom: cr2.bottom - rect.top + rc.scrollTop
      };
      var overlaps = !(crRel.right < boxRect.left || crRel.left > boxRect.right || crRel.bottom < boxRect.top || crRel.top > boxRect.bottom);
      var num = parseInt(cards[i].getAttribute('data-num'));
      var bld = parseInt(cards[i].getAttribute('data-bld'));
      var key = num + '_' + bld;
      if(overlaps && !_drag.processed[key]){
        _drag.processed[key] = true;
        var isSel = cards[i].classList.contains('sel');
        if(_drag.mode === 'add' && !isSel){
          cr(num);
        } else if(_drag.mode === 'remove' && isSel){
          cr(num);
        }
      }
    }
  });
  document.addEventListener('mouseup', function(){
    if(!_drag.active) return;
    _drag.active = false;
    var box = document.getElementById('selBox');
    box.style.display = 'none';
    box.style.width = '0px';
    box.style.height = '0px';
    rPf(); updSelBar();
  });
}

// ========== 房间类型选择与自动排房 ==========
var roomTypePref = 'single'; // 默认单间

function selectRoomType(type){
  roomTypePref = type;
  document.querySelectorAll('.rt-toggle-btn').forEach(function(btn){
    btn.classList.remove('active');
  });
  document.querySelector('.rt-toggle-btn[data-type="'+type+'"]').classList.add('active');
  t('已选择' + (type==='single'?'单间':'标间'), 'i');
}

function autoAssignRooms(){
  var fd = document.getElementById('df').value,
      td = document.getElementById('dt').value,
      pp = parseInt(document.getElementById('pp').value);
  
  if(!fd || !td){
    t('请先选择入住和退房日期', 'e');
    return;
  }
  if(!pp || pp <= 0){
    t('请填写入住人数', 'e');
    return;
  }
  
  // 计算需要多少个房间
  var pplPerRoom = roomTypePref === 'double' ? 2 : 1;
  var neededRooms = Math.ceil(pp / pplPerRoom);
  
  // 获取可用房间
  var availableRooms = [];
  for(var i = 0; i < ALL.length; i++){
    var room = ALL[i];
    if(!isBkd(room.num, fd, td)){
      availableRooms.push(room);
      if(availableRooms.length >= neededRooms) break;
    }
  }
  
  if(availableRooms.length === 0){
    t('选定日期范围内没有可用房间', 'e');
    return;
  }
  
  if(availableRooms.length < neededRooms){
    t('可用房间不足，当前只有 ' + availableRooms.length + ' 间可用，但需要 ' + neededRooms + ' 间', 'w');
  }
  
  // 清空已选，自动分配房间
  clearSel();
  var roomsToAssign = Math.min(availableRooms.length, neededRooms);
  for(var i = 0; i < roomsToAssign; i++){
    var room = availableRooms[i];
    var card=document.querySelector('.room-card[data-num="'+room.num+'"][data-bld="'+room.bld+'"]');
    if(card){card.classList.remove('avl');card.classList.add('sel');card.setAttribute('data-type',roomTypePref);}
  }
  
  rPf();
  updatePP();
  updSelBar();
  t('已自动分配 ' + roomsToAssign + ' 间' + (roomTypePref==='single'?'单间':'标间'), 's');
}

function cr(num){
  var fd=document.getElementById('df').value,td=document.getElementById('dt').value,b=parseInt(document.getElementById('bld').value);
  if(!fd||!td){t('请先选择入住和退房日期','e');return;}
  if(isBkd(num,fd,td)){return;} // 已占用房间静默跳过
  var card=document.querySelector('.room-card[data-num="'+num+'"][data-bld="'+b+'"]');
  if(!card) return;
  if(card.classList.contains('sel')){
    card.classList.remove('sel');card.classList.add('avl');
  }else{
    card.classList.remove('avl');card.classList.add('sel');card.setAttribute('data-type',roomTypePref);
    card.classList.add('just-selected');setTimeout(function(){card.classList.remove('just-selected');},300);
  }
  // 拖动时只更新样式避免闪烁；松开后再完整重绘
  if(_drag&&_drag.active){
    updatePP();
    updSelBar();
  }else{
    rPf();
    updSelBar();
  }
}
function updatePP(){var cnt=0;var cards=document.querySelectorAll('#rc .room-card.sel');cards.forEach(function(card){var tp=card.getAttribute('data-type')||'single';cnt+=(tp==='double'?2:1);});var el=document.getElementById('pp');if(el)el.value=cnt||'';}
function s(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rtc(btn,num,bld){
  event.stopPropagation();
  var card=btn.closest('.room-card');
  if(!card)return;
  var cur=card.getAttribute('data-type')||'single';
  var nt=cur==='double'?'single':'double';
  card.setAttribute('data-type',nt);
  rPf();
  updSelBar();
}
function ucn(num,bld,idx,val){
  // 名字变化时只需更新 sel-bar 即可，下次 rPf 会重新渲染
  updSelBar();
}
function updSelBar(){
  var rc=document.getElementById('rc');
  var cards=rc?rc.querySelectorAll('.room-card.sel'):[];
  var cnt=cards.length;
  var bar=document.getElementById('selBar');
  var num=document.getElementById('selBarNum');
  if(cnt===0){
    if(bar)bar.style.display='none';
  }else{
    if(bar)bar.style.display='flex';
    if(num)num.textContent=cnt;
  }
}
function clearSel(){
  document.querySelectorAll('.room-card.sel').forEach(function(card){
    card.classList.remove('sel');card.classList.add('avl');
  });
  rPf();
  updSelBar();
  t('已清空选择','i');
}
function updS(){var fd=document.getElementById('df').value,td=document.getElementById('dt').value;if(!fd||!td){document.getElementById('sAvl').textContent='-';document.getElementById('sBkd').textContent='-';return;}var cnt=0,d=new Date(fd),end=new Date(td);while(d<=end){var ds=d.toISOString().slice(0,10);for(var i=0;i<BK.length;i++){var b=BK[i];if(b.st!=='c'&&ds>=b.df&&ds<=b.dt){for(var j=0;j<b.rs.length;j++){var uid=uVal(b.rs[j]);if(!isVirtual(uid))cnt++;}}}d.setDate(d.getDate()+1);}var days=Math.max(1,Math.round((end-new Date(fd))/86400000)+1);document.getElementById('sAvl').textContent=ALL.length-Math.round(cnt/days);document.getElementById('sBkd').textContent=Math.round(cnt/days);}
function sub(){
  var dep = document.getElementById('dep').value.trim(),
      co = document.getElementById('con').value.trim(),
      ph = document.getElementById('ph').value.trim(),
      pur = document.getElementById('pur').value.trim(),
      mt = document.getElementById('mt').value.trim(),
      mf = document.getElementById('mf').checked,
      vh = document.getElementById('vh').checked,
      dl = document.getElementById('dl').value.trim(),
      dtm = document.getElementById('dtm').value.trim(),
      rmk = document.getElementById('rmk').value.trim(),
      fd = document.getElementById('df').value,
      td = document.getElementById('dt').value,
      pp = parseInt(document.getElementById('pp').value),
      sel = gS();
  
  // 必填验证
  if(!dep){t('请填写部门','e');return;}
  if(!co){t('请填写联系人','e');return;}
  if(!ph){t('请填写电话','e');return;}
  if(!pp || pp <= 0){t('请填写入住人数','e');return;}
  if(!fd || !td){t('请选择入住和退房日期','e');return;}
  if(sel.length === 0){t('请至少选择一个房间','e');return;}
  
  // 检查房间是否已被预约
  for(var i = 0; i < sel.length; i++){
    if(isBkd(sel[i].n, fd, td)){
      t('房间 '+sel[i].n+' 在选定时间范围内已被预约','e');
      return;
    }
  }
  
  // 构建房间列表
  var rs = [];
  for(var i = 0; i < sel.length; i++){
    var o = {u: sel[i].b * 10000 + sel[i].n, na: sel[i].nm || ''};
    if(sel[i].tp === 'double' && sel[i].nm2) o.nb = sel[i].nm2;
    rs.push(o);
  }
  
  // 计算总人数
  var pa = parseFloat(document.getElementById('pa').value) || 0,
      pm = parseFloat(document.getElementById('pm').value) || 0,
      po = parseFloat(document.getElementById('po').value) || 0,
      totalPP = 0;
  for(var i = 0; i < sel.length; i++){
    totalPP += (sel[i].tp === 'double' ? 2 : 1);
  }
  
  // 保存到数据库
  BK.push({
    id: 'b' + Date.now() + Math.random().toString(36).slice(2, 6),
    dep: dep,
    co: co,
    ph: ph,
    pu: pur || '培训',
    mt: mt,
    mf: mf,
    vh: vh,
    dl: dl,
    dtm: dtm,
    rmk: rmk,
    pp: totalPP,
    pa: pa,
    pm: pm,
    po: po,
    df: fd,
    dt: td,
    rs: rs,
    st: 'y',
    at: new Date().toISOString().slice(0, 10)
  });
  
  sv();
  
  // 清空表单
  document.getElementById('dep').value = '';
  document.getElementById('con').value = '';
  document.getElementById('ph').value = '';
  document.getElementById('pur').value = '';
  document.getElementById('pp').value = '';
  document.getElementById('pa').value = '';
  document.getElementById('pm').value = '';
  document.getElementById('po').value = '';
  document.getElementById('mt').value = '';
  document.getElementById('mf').checked = false;
  document.getElementById('vh').checked = false;
  document.getElementById('dl').value = '';
  document.getElementById('dtm').value = '';
  document.getElementById('rmk').value = '';
  
  // 清除所有房间选择
  document.querySelectorAll('.room-card.sel').forEach(function(card){
    card.classList.remove('sel');card.classList.add('avl');
  });
  
  rPf();
  updSelBar();
  t(dep + ' 于 ' + fd + '~' + td + ' 使用 ' + sel.length + ' 间房 申请已提交', 's');
}

function impHandle(file){
  if(!file||!file.name.endsWith('.docx')){t('请选择 .docx 文件','e');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    if(typeof mammoth==='undefined'){t('mammoth.js 未加载，请刷新后重试','e');return;}
    mammoth.extractRawText({arrayBuffer:e.target.result}).then(function(r){impParse(r.value);}).catch(function(){impParseFallback();});
  };
  reader.readAsArrayBuffer(file);
}

function impParseFallback(){
  t('请确保上传的是 Word .docx 格式验收单','e');
}

function impParse(raw){
  var lines=raw.split(/\n/).map(function(l){return l.trim();}).filter(function(l){return l;});
  var info={project:'',supplier:'',amount:'',date:''};
  for(var i=0;i<Math.min(lines.length,20);i++){
    var ln=lines[i];
    if(/采购品目/.test(ln))info.project=ln.replace(/.*采购品目名称\s*/,'').trim();
    if(/供应商/.test(ln))info.supplier=ln.replace(/.*供应商名称\s*/,'').trim();
    if(/合同总金额/.test(ln)){var am=ln.match(/([\d.]+)/);if(am)info.amount=am[1];}
    if(/验收日期/.test(ln)){var dm=ln.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);if(dm)info.date=dm[1]+'-'+dm[2].padStart(2,'0')+'-'+dm[3].padStart(2,'0');}
  }
  // 找验收记录表
  var tblStart=-1;
  for(var i=0;i<lines.length;i++){if(/验收记录.*序号|设备名称.*型号.*合同数量/.test(lines[i])){tblStart=i;break;}}
  if(tblStart===-1){t('未找到验收记录表格，请确认文件格式','e');return;}

  var items=[];
  for(var i=tblStart+1;i<lines.length;i++){
    var ln=lines[i];
    if(/合同一致性|产品性能测试|验收结论|供应商代表|验收小组|备注/.test(ln))break;
    var parts=ln.split(/\s{2,}/);
    if(parts.length>=4&&/^\d+$/.test(parts[0])){
      // 找到所有数字列
      var nums=[];for(var j=0;j<parts.length;j++)if(/^\d+$/.test(parts[j]))nums.push(parseInt(parts[j]));
      if(nums.length>=3){
        var name=parts[1]||'';
        var model='';
        for(var j=2;j<parts.length;j++){if(!/^\d+$/.test(parts[j])){model=parts[j];break;}}
        var cq=nums[nums.length-2],aq=nums[nums.length-1];
        items.push({seq:nums[0],name:name,model:model,contractQty:cq,acceptQty:aq});
      }
    }
  }

  if(items.length===0){t('未解析到设备条目','e');return;}
  impData={info:info,items:items};
  impPreview();
}

// ========== 月份日历占用视图 ==========
var calYear, calMonth;

function initCal(){
  if(typeof calYear==='undefined'||typeof calMonth==='undefined'){
    var now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth() + 1;
  }
  renderCal();
}

function changeCalMonth(delta){
  calMonth += delta;
  if(calMonth < 1){ calMonth = 12; calYear--; }
  if(calMonth > 12){ calMonth = 1; calYear++; }
  renderCal();
}

function renderCal(){
  var bldFilter = document.getElementById('ovBldFilter') ? document.getElementById('ovBldFilter').value : 'all';
  document.getElementById('ovMonthTitle').textContent = calYear + ' · ' + calMonth + '月';

  var dayMap = {};
  var first = new Date(calYear, calMonth-1, 1);
  var last = new Date(calYear, calMonth, 0);
  var today = new Date(); today.setHours(0,0,0,0);

  for(var i = 0; i < BK.length; i++){
    var bk = BK[i];
    if(bk.st === 'c') continue;
    if(!bk.df || !bk.dt) continue;
    var dFrom = new Date(bk.df); dFrom.setHours(0,0,0,0);
    var dTo = new Date(bk.dt); dTo.setHours(0,0,0,0);
    if(dTo < first || dFrom > last) continue;
    var d = new Date(Math.max(dFrom.getTime(), first.getTime()));
    var end = new Date(Math.min(dTo.getTime(), last.getTime()));
    while(d <= end){
      var ds = d.toISOString().slice(0,10);
      if(!dayMap[ds]) dayMap[ds] = {};
      for(var j = 0; j < bk.rs.length; j++){
        var uid = uVal(bk.rs[j]);
        var g = gu(uid);
        if(g && (bldFilter === 'all' || g.bld === parseInt(bldFilter))){
          dayMap[ds][uid] = true;
        }
      }
      d.setDate(d.getDate() + 1);
    }
  }

  var totalRooms = 0;
  for(var i = 0; i < ALL.length; i++){
    if(bldFilter === 'all' || ALL[i].bld === parseInt(bldFilter)) totalRooms++;
  }

  var sumOcc = 0, maxOcc = 0, dayCnt = 0;
  var dks = Object.keys(dayMap);
  for(var i = 0; i < dks.length; i++){
    var c = Object.keys(dayMap[dks[i]]).length;
    sumOcc += c; dayCnt++;
    if(c > maxOcc) maxOcc = c;
  }
  var avgOcc = dayCnt > 0 ? Math.round(sumOcc / dayCnt) : 0;

  // 渲染日历
  var calEl = document.getElementById('ovCal');
  var wkds = ['日','一','二','三','四','五','六'];
  var h = '';
  for(var w = 0; w < 7; w++) h += '<div class="wkd'+(w===0||w===6?' wk':'')+'">'+wkds[w]+'</div>';

  var startDow = first.getDay();
  for(var i = 0; i < startDow; i++) h += '<div class="day empty"></div>';

  for(var d = 1; d <= last.getDate(); d++){
    var date = new Date(calYear, calMonth-1, d);
    var ds = date.toISOString().slice(0,10);
    var occ = dayMap[ds] ? Object.keys(dayMap[ds]).length : 0;
    var isToday = (date.getTime() === today.getTime());
    var isPast = date < today;
    var cls = 'day' + (isToday ? ' today' : '') + (isPast ? ' past' : '') + (occ > 0 ? ' occ' : ' free');
    h += '<div class="'+cls+'" onclick="calDayClick(this,\''+ds+'\','+occ+','+(totalRooms-occ)+')" title="'+ds+'\n已占用 '+occ+' 间  ·  可安排 '+(totalRooms-occ)+' 间">'
        + '<span class="dn">'+d+'</span>'
        + '<span class="oc">'+(occ > 0 ? occ+'间' : '空')+'</span>'
        + '</div>';
  }
  calEl.innerHTML = h;

  // 日期范围列表
  renderRangeList(first, last, today);

  // 底部统计
  var sumEl = document.getElementById('ovSummary');
  sumEl.innerHTML = 
    '<div class="s-item"><span class="s-dot" style="background:var(--blue)"></span>已占用 <span class="s-num red">'+avgOcc+'</span><span class="s-label">间/天</span></div>'+
    '<div class="s-item"><span class="s-dot" style="background:var(--green)"></span>可安排 <span class="s-num green">'+(totalRooms-avgOcc)+'</span><span class="s-label">间</span></div>'+
    '<div class="s-item"><span class="s-dot" style="background:var(--champagne)"></span>总房间 <span class="s-num">'+totalRooms+'</span><span class="s-label">间</span></div>'+
    '<div class="s-item" style="margin-left:auto"><span class="s-label">最大占用 </span><span class="s-num" style="font-size:14px">'+maxOcc+'</span><span class="s-label">间</span></div>';

  var countEl = document.getElementById('dateOvCount');
  if(countEl){
    var bks = BK.filter(function(b){ return b.st !== 'c'; });
    countEl.textContent = bks.length + ' 条记录';
  }
}

function calDayClick(el, ds, occ, avl){
  // 反选
  if(el.classList.contains('sel')){
    el.classList.remove('sel');
    document.getElementById('ovInfo').classList.remove('show');
    return;
  }
  // 清除之前选中
  var allDays = document.querySelectorAll('#ovCal .day.sel');
  for(var i = 0; i < allDays.length; i++) allDays[i].classList.remove('sel');
  // 选中当前
  el.classList.add('sel');
  // 查找包含该日期的预约
  var ranges = [];
  for(var i = 0; i < BK.length; i++){
    if(BK[i].st === 'c') continue;
    if(!BK[i].df || !BK[i].dt) continue;
    var df = BK[i].df, dt = BK[i].dt;
    if(ds >= df && ds <= dt){
      ranges.push({dep:BK[i].dep, df:df.slice(5), dt:dt.slice(5), rooms:BK[i].rs.length});
    }
  }
  // 显示信息条
  var infoEl = document.getElementById('ovInfo');
  var dsLabel = ds.slice(5).replace('-','/');
  var rngHtml = '';
  if(ranges.length > 0){
    rngHtml = '<span class="oi-stat">|</span>';
    for(var i = 0; i < ranges.length; i++){
      rngHtml += '<span class="oi-stat">'+ranges[i].dep+' <strong>'+ranges[i].df+'~'+ranges[i].dt+'</strong> '+ranges[i].rooms+'间</span>';
    }
  }
  infoEl.innerHTML = 
    '<span class="oi-date">📅 '+ds+'</span>'+
    '<span class="oi-stat">已占用 <strong style="color:var(--red)">'+occ+'</strong> 间</span>'+
    '<span class="oi-stat">可安排 <strong style="color:var(--green-dark)">'+avl+'</strong> 间</span>'+
    rngHtml +
    '<button class="btn btn-sm btn-primary" onclick="setCheckIn(\''+ds+'\')" style="margin-left:auto">选为入住日期</button>';
  infoEl.classList.add('show');
}

function renderRangeList(first, last, today){
  var rngEl = document.getElementById('ovRanges');
  if(!rngEl) return;
  // 筛选当月内有交集的预约
  var bks = [];
  for(var i = 0; i < BK.length; i++){
    if(BK[i].st === 'c') continue;
    if(!BK[i].df || !BK[i].dt) continue;
    var dFrom = new Date(BK[i].df); dFrom.setHours(0,0,0,0);
    var dTo = new Date(BK[i].dt); dTo.setHours(0,0,0,0);
    if(dTo < first || dFrom > last) continue;
    bks.push(BK[i]);
  }
  bks.sort(function(a,b){ return a.df.localeCompare(b.df); });
  if(bks.length === 0){
    rngEl.innerHTML = '';
    return;
  }
  var h = '<div class="ov-range-header">📋 当月排房明细</div>';
  for(var i = 0; i < bks.length; i++){
    var bk = bks[i];
    var df = bk.df.slice(5).replace('-','/'), dt = bk.dt.slice(5).replace('-','/');
    var dFrom = new Date(bk.df); dFrom.setHours(0,0,0,0);
    var dTo = new Date(bk.dt); dTo.setHours(0,0,0,0);
    var dotColor;
    if(today >= dFrom && today <= dTo) dotColor = 'var(--blue)';
    else if(today < dFrom) dotColor = 'var(--amber)';
    else dotColor = 'var(--slate-300)';
    h += '<div class="ov-range-row">'
      + '<span class="rr-dot" style="background:'+dotColor+'"></span>'
      + '<span class="rr-dates">'+df+' ~ '+dt+'</span>'
      + '<span class="rr-dep">'+bk.dep+'</span>'
      + '<span class="rr-info">'+(bk.pu||'')+(bk.pp?' '+bk.pp+'人':'')+'</span>'
      + '<span class="rr-rooms">'+bk.rs.length+'间</span>'
      + '</div>';
  }
  rngEl.innerHTML = h;
}

function setCheckIn(ds){
  document.getElementById('df').value = ds;
  // 退房默认+1天
  var d = new Date(ds+'T00:00:00');
  d.setDate(d.getDate()+1);
  document.getElementById('dt').value = d.toISOString().slice(0,10);
  rPf();
  renderCal();
  // 滚动到排房表单
  document.querySelector('.bp').scrollIntoView({behavior:'smooth',block:'start'});
}

// 兼容旧调用
function renderDateOverview(){ initCal(); }


// ========== 导出/导入数据 ==========
function expData(){
  var data={bk:BK,wh:WH,whl:WHL};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='排房数据_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function impData(){
  document.getElementById('impFile').click();
}

function handleImp(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!confirm('导入将覆盖当前数据，确认继续？'))return;
      BK=data.bk||[];
      WH=data.wh||[];
      WHL=data.whl||[];
      sv();
      alert('✅ 导入成功！共 '+BK.length+' 条排房记录');
      // 刷新所有页面
      if(typeof iPf==='function')iPf();
      if(typeof iZl==='function')iZl();
      if(typeof rWh==='function')rWh();
      if(typeof renderDateOverview==='function')renderDateOverview();
    }catch(err){alert('❌ 文件格式错误：'+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}
